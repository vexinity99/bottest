<!DOCTYPE html>
<html>
<head>

<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Nunito:400,700|Titan+One">
<link rel="icon" href="https://cdn.glitch.global/50648a61-8fe9-4ce0-a01c-baff9438bbf2/bblogo.png">

<meta name="google-site-verification" content="hXfzArWd2gCecss0IkRxoThhZZK7FMXQfvOpgj14AyQ"/>

<title>Blooket Bot</title>

<style>

body{
margin:0;
font-family:Nunito,sans-serif;
background:rgb(9,148,65);
overflow:hidden;
}

.mainBody{
position:absolute;
top:0;
left:0;
width:100%;
min-height:100vh;
}

.normtext{
font-size:40px;
color:white;
font-family:"Titan One",sans-serif;
user-select:none;
}

.codecontainer{
margin:20px;
}

.idInputContainer,.nameInputContainer{
height:60px;
background:white;
border-radius:6px;
box-shadow:inset 0 -6px #0003,0 0 4px #00000026;
padding-bottom:6px;
margin-bottom:10px;
}

.idInputContainer{width:200px;}
.nameInputContainer{width:348px;}

.idInput,.nameInput{
width:100%;
height:100%;
border:none;
font-size:35px;
text-align:center;
background:transparent;
font-weight:700;
outline:none;
}

.joinButton{
height:60px;
width:120px;
background:white;
border-radius:6px;
box-shadow:inset 0 -6px #0003,0 0 4px #00000026;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
margin-top:10px;
}

.joinButton:hover{
transform:scale(.95);
}

.btext{
font-size:22px;
}

input[type="checkbox"]{
transform:scale(1.5);
margin-left:10px;
}

.errorBar{
position:absolute;
top:100%;
background:#e84135;
color:white;
width:100%;
text-align:center;
font-size:20px;
padding:10px;
transition:.2s;
}

.chat{
position:fixed;
top:350px;
left:200px;
display:none;
background:orange;
border-radius:10px;
}

.chatcontainer{
width:750px;
height:250px;
background:#202020a0;
margin:10px;
overflow-y:auto;
display:flex;
flex-direction:column-reverse;
}

.chatmsg{
color:white;
font-size:22px;
}

</style>
</head>


<body>

<div class="mainBody">

<div class="codecontainer">

<div class="normtext">Enter code:</div>

<div class="idInputContainer">
<input id="gcode" class="idInput" placeholder="Game ID">
</div>

<div class="nameInputContainer">
<input id="gname" class="nameInput" placeholder="Nickname">
</div>

<div class="joinButton" onclick="join()">
<div class="btext">Join</div>
</div>

<div class="normtext">
Incognito Mode
<input type="checkbox" id="icogmode" checked>
</div>

<div class="normtext">
Bypass Filter
<input type="checkbox" id="bcf">
</div>

<div class="normtext">
First Place Switch
<input type="checkbox" id="fpswitch" checked>
</div>

<div class="normtext" style="font-size:20px;">
*for first place switch to work your amount must not be a number
</div>

</div>

<div class="normtext" id="status">Status: Loading...</div>

<div class="normtext">
Created by
<a href="https://www.youtube.com/@crypto.7562" target="_blank" style="color:white;">
Ducklife3141
</a>
</div>

<div class="normtext">
<a href="https://discord.com/invite/WYsFbAgY2v" target="_blank" style="color:white;">
Join the discord server!
</a>
</div>

<div class="errorBar" id="error"></div>

</div>



<script type="module">

import { initializeApp, deleteApp } from 'https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js'
import { getAuth, signInWithCustomToken, setPersistence } from 'https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js'
import { getDatabase, ref, set, get, onValue } from 'https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js'

window.initializeApp = initializeApp;
window.getAuth = getAuth;
window.deleteApp = deleteApp;
window.getDatabase = getDatabase;
window.ref = ref;
window.set = set;
window.get = get;
window.onValue = onValue;
window.signInWithCustomToken = signInWithCustomToken;
window.setPersistence = setPersistence;

const urlcode = new URLSearchParams(window.location.search).get("code");

if(urlcode){
document.querySelector("#gcode").value = urlcode;
}

</script>


<script src="https://zalgo.org/lunicode.js"></script>

<script>

function join(){

const gameCode = document.getElementById("gcode").value
const nickname = document.getElementById("gname").value
const incognito = document.getElementById("icogmode").checked

if(!gameCode || !nickname){
errorBar("Enter a game code and nickname")
return
}

joinGame(gameCode,nickname,incognito)

}

function errorBar(message){

const e = document.getElementById("error")

e.innerText = message
e.style.transform = "translateY(-100%)"

setTimeout(()=>{
e.style.transform="translateY(0%)"
},4000)

}

</script>


<script src="js/script.js"></script>

</body>
</html>
